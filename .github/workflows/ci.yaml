name: ci

on:
  push:
   paths:
     - src/**
   branches:
     - master

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV    

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Sophos certificate file
        run: |
          cat <<EOF > sophos_ca.crt
          ${{ secrets.SOPHOS_CA_CRT }}
          EOF

      - name: Verify cert exists
        run: ls -l sophos_ca.crt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # -
      #   name: Build and push
      #   uses: docker/build-push-action@v7
      #   with:
      #     push: true
      #     tags: zahraehghaghi/python-app:${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: zahraehghaghi/python-app:${{ env.SHORT_SHA }}          