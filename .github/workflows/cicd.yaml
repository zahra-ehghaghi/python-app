name: cicd

on:
  push:
   paths:
     - src/**
   branches:
     - master

jobs:
  ci:    
    runs-on: ubuntu-latest
    steps:
      - name: Set short SHA
        run: echo "COMMIT_ID=${GITHUB_SHA::6}" >> $GITHUB_ENV    

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Sophos certificate file
        run: |
          cat <<EOF > sophos_ca.crt
          ${{ secrets.SOPHOS_CA_CRT }}
          EOF

      - name: Verify cert exists
        run: ls -l sophos_ca.crt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # -
      #   name: Build and push
      #   uses: docker/build-push-action@v7
      #   with:
      #     push: true
      #     tags: zahraehghaghi/python-app:${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: zahraehghaghi/python-app:${{ env.COMMIT_ID }}     
    outputs: 
      commit_id: ${{ env.SCOMMIT_ID }}               
  cd:    
    runs-on: self-hosted
    needs: ci
    steps:    
      
      - uses: actions/checkout@v3

      - name: Modify values file 
        shell: bash
        run: |       
          echo ${{ needs.ci.outputs.commit_id }}
          pip install yq
          yq -Yi '.image.tag= "${{ needs.ci.outputs.commit_id }}"' charts/python-app/values.yaml
    
      - name: Commit change
        uses: EndBug/add-and-commit@v9
        with: 
          message: 'Update values.yaml with ${{ needs.ci.outputs.commit_id }}'

      - name: Install Argocd
        shell: bash
        run: |       
          curl -ksSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Argocd app sync
        shell: bash
        run: |       
          argocd  login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin --password  ${{ secrets.ARGOCD_PASSWORD }}
          argocd  app sync python-app